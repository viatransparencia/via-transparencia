[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Página principal
[[redirects]]
  from = "/"
  to   = "/via-transparencia.html"
  status = 200

# Redirigir tokens de invitación y recuperación a la página dedicada
[[redirects]]
  from = "/#invite_token=*"
  to   = "/confirm.html#invite_token=:splat"
  status = 301

[[redirects]]
  from = "/#recovery_token=*"
  to   = "/confirm.html#recovery_token=:splat"
  status = 301

